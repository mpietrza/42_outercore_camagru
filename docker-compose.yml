services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - appnet
  
  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - appnet

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: camagru
      POSTGRES_USER: camagru
      POSTGRES_PASSWORD: camagru
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - appnet

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025" # Mailhog SMTP port
      - "8025:8025" # Mailhog web UI port
    networks:
      - appnet

volumes:
  postgres_data:

networks:
  appnet:
